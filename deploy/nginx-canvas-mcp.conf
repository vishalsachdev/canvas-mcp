# Canvas MCP Server — nginx reverse proxy
# Cloudflare handles browser-facing SSL; origin uses self-signed cert
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 443 ssl;
    server_name mcp.illinihunt.org;

    ssl_certificate /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    location / {
        proxy_pass http://127.0.0.1:8819;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through Canvas credential headers
        proxy_set_header X-Canvas-Token $http_x_canvas_token;
        proxy_set_header X-Canvas-URL $http_x_canvas_url;

        # Required for SSE/streaming MCP responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name mcp.illinihunt.org;
    return 301 https://$host$request_uri;
}
